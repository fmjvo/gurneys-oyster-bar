<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gurney's Oyster Bar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f1ea;
      --text: #2c3540;
      --accent: #6a8c7f;
      --muted: #7a8a95;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Inter, sans-serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
    }

    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px;
      border-bottom: 2px solid var(--accent);
      max-width: 640px;
      margin: 0 auto;
    }

    header img {
      width: 42px;
      height: 42px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .header-text .tagline {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-top: 4px;
    }

    #main {
      max-width: 640px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .menu-section {
      padding: 20px 0 8px;
    }

    .section-heading {
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .menu-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 8px 0;
      border-bottom: 1px solid rgba(44, 53, 64, 0.07);
    }

    .item-left { flex: 1; }

    .item-name {
      font-size: 14px;
      line-height: 1.4;
      overflow-wrap: break-word;
    }

    .item-allergens {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      letter-spacing: 0.02em;
    }

    .item-price {
      font-size: 14px;
      font-weight: 300;
      margin-left: 16px;
      white-space: nowrap;
    }

    .pdf-frame {
      width: 100%;
      height: calc(100vh - 90px);
      border: none;
      display: block;
    }

    .status {
      padding: 48px 0;
      text-align: center;
      font-size: 14px;
      color: var(--muted);
    }

    .subsection-heading {
      font-family: Inter, sans-serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      padding-left: 4px;
      margin-top: 12px;
      margin-bottom: 4px;
    }

    .price-list {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      margin-left: 16px;
    }

    .price-variant {
      display: flex;
      align-items: baseline;
      gap: 6px;
      white-space: nowrap;
    }

    .price-label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 400;
    }

    .price-amount {
      font-size: 14px;
      font-weight: 300;
    }
  </style>
</head>
<body>
  <header>
    <img src="placeholder-logo.svg" alt="Gurney's Oyster Bar">
    <div class="header-text">
      <h1>Gurney's Oyster Bar</h1>
      <p class="tagline">Drove Orchards, Thornham, Norfolk</p>
    </div>
  </header>
  <main id="main">
    <div class="status">Loading…</div>
  </main>
  <script>
    const CONFIG = {
      sheetUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRaqVNhAEELP9SiGOgkS2tN9dP30rGiW41_-DsLKzoemBf0MYN_qlQzzyKGnouRjJLg-_SH77yPH5lH/pub?output=csv',
    };

    // Last successfully fetched CSV text — used for no-flicker de-dup
    let _lastCsv = null;
    // Latest parsed settings — used by the polling loop
    let _lastSettings = null;

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function parseCSV(text) {
      const rows = [];
      const normalized = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').trim();
      let field = '';
      let row = [];
      let inQuotes = false;
      const pushRow = () => {
        row.push(field);
        if (row.length > 1 || row[0] !== '') rows.push(row);
        field = '';
        row = [];
      };
      for (let i = 0; i < normalized.length; i++) {
        const char = normalized[i];
        if (inQuotes) {
          if (char === '"' && normalized[i + 1] === '"') { field += '"'; i++; }
          else if (char === '"') { inQuotes = false; }
          else { field += char; }
        } else if (char === '"') {
          inQuotes = true;
        } else if (char === ',') {
          row.push(field);
          field = '';
        } else if (char === '\n') {
          pushRow();
        } else {
          field += char;
        }
      }
      pushRow();
      return rows;
    }

    function extractDriveId(url) {
      if (!url) return null;
      const m1 = url.match(/\/d\/([^/]+)/);
      if (m1) return m1[1];
      const m2 = url.match(/[?&]id=([^&]+)/);
      if (m2) return m2[1];
      return null;
    }

    function parseSettings(rows) {
      let pdfOn = false;
      let pdfUrl = '';
      let autoOn = true;
      let autoSecs = 60;

      for (const row of rows) {
        const key = (row[0] || '').trim().toUpperCase();
        if (key === 'PDF OVERRIDE') {
          pdfOn = (row[1] || '').trim().toUpperCase() === 'ON';
          pdfUrl = (row[2] || '').trim();
        } else if (key === 'AUTO REFRESH') {
          autoOn = (row[1] || '').trim().toUpperCase() !== 'OFF';
          const parsed = parseInt(row[2], 10);
          autoSecs = isNaN(parsed) ? 60 : Math.min(3600, Math.max(15, parsed));
        } else if (key === 'SECTION') {
          // Stop scanning once we hit the menu header row
          break;
        }
      }

      return { pdfOn, pdfUrl, autoOn, autoSecs };
    }

    function parsePrice(cell) {
      const parts = String(cell).split('|').map(s => s.trim()).filter(Boolean);
      if (!parts.length) return [{ label: '', price: cell }];
      return parts.map(part => {
        const tokens = part.split(/\s+/);
        const last = tokens[tokens.length - 1];
        if (tokens.length > 1 && (last.startsWith('£') || /^\d/.test(last))) {
          const label = tokens.slice(0, -1).join(' ');
          return { label, price: last };
        }
        return { label: '', price: part };
      });
    }

    function renderMenu(menuRows) {
      const main = document.getElementById('main');
      const data = menuRows.filter(r => r.length >= 4 && (r[2] || '').trim() && (r[3] || '').trim());
      if (!data.length) {
        main.innerHTML = '<div class="status">Menu unavailable — please ask a member of staff.</div>';
        return;
      }

      // Build insertion-ordered section → subsection → items structure
      const sections = {};
      const sectionOrder = [];
      for (const row of data) {
        const [section, subsection, name, price, allergens = ''] = row;
        const sec = (section || '').trim();
        const sub = (subsection || '').trim();
        if (!sections[sec]) { sections[sec] = { subOrder: [], subs: {} }; sectionOrder.push(sec); }
        if (!sections[sec].subs[sub]) { sections[sec].subs[sub] = []; sections[sec].subOrder.push(sub); }
        sections[sec].subs[sub].push({ name: (name || '').trim(), price: (price || '').trim(), allergens: (allergens || '').trim() });
      }

      main.innerHTML = sectionOrder.map(sec => {
        const secData = sections[sec];
        const subsHtml = secData.subOrder.map(sub => {
          const subHeading = sub ? `<div class="subsection-heading">${escapeHtml(sub)}</div>` : '';
          const itemsHtml = secData.subs[sub].map(item => {
            const variants = parsePrice(item.price);
            const priceHtml = variants.length === 1
              ? `<div class="item-price">${escapeHtml(variants[0].price)}</div>`
              : `<div class="price-list">${variants.map(v =>
                  `<div class="price-variant">${v.label ? `<span class="price-label">${escapeHtml(v.label)}</span>` : ''}<span class="price-amount">${escapeHtml(v.price)}</span></div>`
                ).join('')}</div>`;
            return `
            <div class="menu-item">
              <div class="item-left">
                <div class="item-name">${escapeHtml(item.name)}</div>
                ${item.allergens ? `<div class="item-allergens">${escapeHtml(item.allergens)}</div>` : ''}
              </div>
              ${priceHtml}
            </div>`;
          }).join('');
          return subHeading + itemsHtml;
        }).join('');
        return `
        <div class="menu-section">
          <div class="section-heading">${escapeHtml(sec)}</div>
          ${subsHtml}
        </div>`;
      }).join('');
    }

    function showPDF(fileId) {
      document.getElementById('main').innerHTML =
        `<iframe class="pdf-frame" src="https://drive.google.com/file/d/${encodeURIComponent(fileId)}/preview" title="Menu PDF"></iframe>`;
    }

    async function refresh() {
      const main = document.getElementById('main');
      if (!CONFIG.sheetUrl) {
        if (_lastCsv === null) {
          main.innerHTML = '<div class="status">Menu unavailable — please ask a member of staff.</div>';
        }
        return;
      }
      try {
        const res = await fetch(CONFIG.sheetUrl + '&_=' + Date.now());
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const text = await res.text();

        // Skip re-render if content unchanged (no flicker, preserve scroll)
        if (text === _lastCsv) return;
        _lastCsv = text;

        const rows = parseCSV(text);
        const settings = parseSettings(rows);
        _lastSettings = settings;

        const headerIndex = rows.findIndex(r => (r[0] || '').trim() === 'Section');
        const menuRows = headerIndex >= 0 ? rows.slice(headerIndex + 1) : [];

        if (settings.pdfOn) {
          const fileId = extractDriveId(settings.pdfUrl);
          if (fileId) {
            showPDF(fileId);
            return;
          }
        }

        // PDF is off or no valid Drive ID — render the menu
        renderMenu(menuRows);
      } catch (err) {
        // On failure, keep last good render; only show error if no prior render
        if (_lastCsv === null) {
          main.innerHTML = '<div class="status">Menu unavailable — please ask a member of staff.</div>';
        }
      }
    }

    function loop() {
      refresh().then(() => {
        const settings = _lastSettings;
        if (settings && settings.autoOn) {
          setTimeout(loop, settings.autoSecs * 1000);
        }
      });
    }

    async function init() {
      await refresh();
      // After first fetch attempt, start polling if auto-refresh is on
      if (_lastSettings && _lastSettings.autoOn) {
        setTimeout(loop, _lastSettings.autoSecs * 1000);
      }
    }

    init();
  </script>
</body>
</html>
